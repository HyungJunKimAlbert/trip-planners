<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미국 여행 일정표</title>
<style>
  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --ink: #2b2b2b;
    --muted: #8a8a82;
    --line: #e4e0d8;
    --accent: #c0563a;
    --accent-soft: #f3e3dd;
    --blue: #3a6ea5;
    --green: #4a7c59;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Noto Sans KR", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 20px 100px; }

  /* ---- top toolbar ---- */
  .toolbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(247,245,240,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    display: flex; gap: 8px; align-items: center;
    padding: 10px 20px; margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .toolbar .brand { font-weight: 700; margin-right: auto; letter-spacing: -.3px; }
  .toolbar .brand span { color: var(--accent); }

  /* ---- buttons ---- */
  button {
    font: inherit; cursor: pointer;
    border: 1px solid var(--line); background: var(--card); color: var(--ink);
    border-radius: 8px; padding: 6px 12px; transition: .15s;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.primary:hover { filter: brightness(1.06); color: #fff; }
  button.ghost { background: transparent; border-color: transparent; color: var(--muted); padding: 4px 8px; }
  button.ghost:hover { color: var(--accent); }
  button.sm { padding: 3px 9px; font-size: 13px; border-radius: 6px; }

  /* ---- hero / overview ---- */
  .hero {
    background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
    padding: 34px 32px; margin: 18px 0 30px; position: relative;
    border: 1px solid var(--line);
  }
  .hero .kicker { color: var(--accent); font-weight: 600; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  .hero h1 { margin: 6px 0 4px; font-size: 34px; letter-spacing: -.5px; }
  .hero .meta { color: var(--muted); font-size: 15px; display: flex; gap: 16px; flex-wrap: wrap; }
  .hero .meta b { color: var(--ink); font-weight: 600; }
  .hero .memo { margin-top: 16px; white-space: pre-wrap; color: #4a4a44; }
  .hero .memo img { max-width: 100%; border-radius: 10px; margin: 8px 0; display: block; }
  .hero .dday {
    display: inline-block; margin-top: 14px; background: var(--accent-soft);
    color: var(--accent); font-weight: 700; padding: 5px 14px; border-radius: 999px; font-size: 14px;
  }
  .hero .edit-btn { position: absolute; top: 18px; right: 18px; }

  /* ---- section heading ---- */
  .section { margin: 44px 0 0; }
  .section-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px; }
  .section-head h2 { font-size: 22px; margin: 0; letter-spacing: -.3px; }
  .section-head .count { color: var(--muted); font-size: 14px; }
  .section-head .sp { margin-left: auto; }

  /* ---- timeline (blog posts) ---- */
  .day {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    box-shadow: var(--shadow); padding: 22px 24px; margin-bottom: 22px;
  }
  .day-head { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .day-head .date { font-size: 18px; font-weight: 700; }
  .day-head .dow { color: var(--muted); font-size: 14px; }
  .day-head .sp { margin-left: auto; }
  .timeline { margin-top: 14px; border-left: 2px solid var(--line); padding-left: 0; }
  .tl-item { position: relative; padding: 12px 0 12px 26px; }
  .tl-item::before {
    content: ""; position: absolute; left: -7px; top: 18px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
  }
  .tl-item + .tl-item { border-top: 1px dashed var(--line); }
  .tl-top { display: flex; align-items: flex-start; gap: 8px; flex-wrap: nowrap; cursor: pointer; user-select: none; }
  .tl-top:hover .tl-place { color: var(--accent); }
  .tl-time { flex: 0 0 auto; color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; min-width: 52px; cursor: text; border-radius: 4px; }
  .tl-time:hover { background: var(--accent-soft); }
  .tl-time.empty { color: var(--muted); font-weight: 400; font-size: 12px; border: 1px dashed var(--line); padding: 0 6px; }
  .tl-timeinput { font: inherit; padding: 1px 4px; border: 1px solid var(--accent); border-radius: 4px; }
  .tl-place { font-weight: 600; flex: 1 1 auto; min-width: 0; overflow-wrap: anywhere; }
  .tl-hint { flex: 0 0 auto; font-size: 12px; opacity: .8; white-space: nowrap; }
  .tl-caret { flex: 0 0 auto; color: var(--muted); font-size: 12px; }
  .tl-detail { margin-top: 4px; }
  .tl-memo { color: #5a5a52; font-size: 14px; margin-top: 2px; white-space: pre-wrap; }
  .tl-memo img { max-width: 100%; border-radius: 8px; margin: 6px 0; display: block; }
  /* contenteditable rich memo editor */
  .rich {
    width: 100%; min-height: 90px; max-height: 320px; overflow: auto;
    font: inherit; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink); line-height: 1.6;
  }
  .rich:focus { outline: none; border-color: var(--accent); }
  .rich:empty::before { content: attr(data-placeholder); color: var(--muted); }
  .rich img { max-width: 100%; border-radius: 8px; margin: 6px 0; display: block; }
  .field .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  /* 체크박스 한 줄 (결제수단 아래, 전체폭) */
  .checkrow { display: flex; align-items: center; gap: 8px; margin: 4px 0 14px; cursor: pointer; font-size: 14px; }
  .checkrow input { width: 16px; height: 16px; flex: 0 0 auto; margin: 0; }
  .checkrow .muted { color: var(--muted); font-size: 12px; }
  .tl-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .map-frame { margin-top: 10px; border-radius: 10px; overflow: hidden; border: 1px solid var(--line); }
  .map-frame iframe { width: 100%; height: 220px; border: 0; display: block; }
  a.maplink { color: var(--blue); text-decoration: none; font-size: 13px; }
  a.maplink:hover { text-decoration: underline; }
  /* 날짜 접기 토글 / 카운트 */
  .day-head .caret { font-size: 13px; padding: 2px 6px; color: var(--accent); }
  .day-head .cnt { color: var(--muted); font-size: 12px; }
  /* 메모 이미지 접기 토글 + 크기 */
  .imgwrap { display: block; margin: 6px 0; }
  .imgtoggle { font-size: 12px; color: var(--blue); background: transparent;
    border: 1px solid var(--line); border-radius: 6px; padding: 2px 8px; margin-bottom: 4px; cursor: pointer; }
  .imgtoggle:hover { border-color: var(--accent); color: var(--accent); }
  /* 대시보드 요약표 */
  table.dash { width: 100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 18px; }
  table.dash th, table.dash td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--line); font-size: 13px; }
  table.dash th { background: #faf8f3; color: var(--muted); font-weight: 600; }
  table.dash tr:last-child td { border-bottom: 0; }
  table.dash tbody tr:hover { background: var(--accent-soft); }
  table.dash .dcnt { text-align: center; color: var(--accent); font-weight: 700; }
  /* 이미지 편집기: 선택/리사이즈 툴바 */
  .rich img.sel { outline: 3px solid var(--accent); outline-offset: 1px; }
  .rt-toolbar { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
  .rt-toolbar button { padding: 3px 9px; font-size: 13px; border-radius: 6px; }
  .rt-sw { width: 20px; height: 20px; padding: 0; border-radius: 50%; border: 1px solid var(--line); cursor: pointer; }
  .imgbar { display: none; gap: 4px; align-items: center; margin-bottom: 6px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
  .imgbar.show { display: flex; }

  /* ---- budget ---- */
  .budget-summary {
    display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 18px;
  }
  .bcard {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 18px; box-shadow: var(--shadow); flex: 1; min-width: 150px;
  }
  .bcard .lbl { color: var(--muted); font-size: 13px; }
  .bcard .val { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
  .bcard .sub { color: var(--muted); font-size: 12px; }
  .rate-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); margin-bottom: 14px; flex-wrap: wrap; }
  .rate-row input { width: 90px; }
  table.budget { width: 100%; border-collapse: collapse; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  table.budget th, table.budget td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--line); font-size: 14px; }
  table.budget th { background: #faf8f3; color: var(--muted); font-weight: 600; font-size: 13px; }
  table.budget td.amt { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  table.budget tr:last-child td { border-bottom: 0; }
  .cat-pill { display: inline-block; background: var(--accent-soft); color: var(--accent);
    font-size: 12px; font-weight: 600; padding: 2px 9px; border-radius: 999px; }

  /* ---- links ---- */
  .link-group { margin-bottom: 18px; }
  .link-group h3 { font-size: 15px; margin: 0 0 8px; color: var(--green); }
  .link-list { display: flex; flex-direction: column; gap: 6px; }
  .link-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 9px 14px; box-shadow: var(--shadow);
  }
  .link-item a { color: var(--ink); text-decoration: none; font-weight: 600; flex: 1; }
  .link-item a:hover { color: var(--accent); }
  .link-item .url { color: var(--muted); font-size: 12px; max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---- forms / modal ---- */
  .modal-back {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: none; align-items: flex-start; justify-content: center; z-index: 100;
    padding: 40px 16px; overflow: auto;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 14px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
    width: 100%; max-width: 460px; padding: 24px;
  }
  .modal h3 { margin: 0 0 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select, .field textarea {
    width: 100%; font: inherit; padding: 8px 10px; border: 1px solid var(--line);
    border-radius: 8px; background: #fff; color: var(--ink);
    box-sizing: border-box; min-width: 0; max-width: 100%;
  }
  .field textarea { resize: vertical; min-height: 64px; }
  .field.row2 { display: flex; gap: 10px; }
  .field.row2 > div { flex: 1; min-width: 0; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

  .empty { color: var(--muted); font-style: italic; padding: 8px 2px; }

  @media (max-width: 560px) {
    .wrap { padding: 0 12px 100px; }
    .hero h1 { font-size: 26px; }
    .hero { padding: 24px 18px; }
    .toolbar { padding: 8px 12px; }
    .toolbar .brand { width: 100%; margin-bottom: 4px; }
    /* 일정 항목: 시간/장소는 한 줄, 버튼은 아래 줄 우측 */
    .tl-item { padding-left: 20px; }
    .tl-actions { flex-basis: 100%; justify-content: flex-end; margin-left: 0; margin-top: 4px; }
    /* 예산 한 줄: 항목명 한 줄, 금액·버튼 다음 줄 */
    .erow .ecat { order: 0; }
    .erow .elabel { order: 1; flex-basis: calc(100% - 60px); }
    .erow .eamt { order: 2; }
    .erow .ghost { order: 3; }
    .bday { padding: 14px; }
    .bday-head { gap: 6px; }
    .bday-rate { margin-left: 0; flex-basis: 100%; }
    .totalcard { gap: 16px; padding: 16px; }
    .totalcard .big { font-size: 22px; }
    /* 대시보드 표: 글자/여백 축소 + 가로 스크롤 허용 */
    .dash-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table.dash th, table.dash td { padding: 7px 8px; font-size: 12px; }
    /* 탭 버튼 폭 확보 */
    .tab { padding: 9px 14px; font-size: 15px; }
    /* 모달: 화면 거의 꽉 차게 + 칸 겹침 방지 */
    .modal-back { padding: 14px 8px; align-items: flex-start; }
    .modal { padding: 18px 14px; max-width: none; }
    .modal .field.row2 { flex-wrap: wrap; gap: 10px; }
    .modal .field.row2 > div { flex: 1 1 100%; min-width: 0; }
    .modal .field input, .modal .field select, .modal .rich { width: 100%; }
    .rt-toolbar { gap: 6px; }
  }

  /* ===== 탭 ===== */
  .tabbar { display: flex; gap: 6px; margin: 26px 0 0; border-bottom: 2px solid var(--line); }
  .tab { background: transparent; border: 0; border-bottom: 3px solid transparent; border-radius: 0;
    padding: 10px 18px; font-size: 16px; font-weight: 600; color: var(--muted); margin-bottom: -2px; cursor: pointer; }
  .tab:hover { color: var(--accent); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ===== 예산: 합계/날짜블록 ===== */
  .totalcard { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: 14px;
    padding: 18px 22px; margin: 20px 0; display: flex; gap: 28px; flex-wrap: wrap; align-items: flex-end; }
  .totalcard .lbl { color: var(--accent); font-weight: 600; font-size: 13px; }
  .totalcard .big { font-size: 26px; font-weight: 800; color: var(--accent); letter-spacing: -.5px; }
  .totalcard .sub { color: #9a5a48; font-size: 13px; }
  .bday { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 14px; }
  .bday-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .bday-head .date { font-weight: 700; }
  .bday-head .dow { color: var(--muted); font-size: 13px; }
  .bday-rate { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); margin-left: auto; }
  .bday-rate input { width: 78px; }
  .bsub { text-align: right; font-size: 13px; color: var(--muted); margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--line); }
  .erow { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px dashed var(--line); font-size: 14px; flex-wrap: wrap; }
  .erow:last-child { border-bottom: 0; }
  .erow .ecat { flex: 0 0 auto; }
  .erow .elabel { flex: 1 1 120px; min-width: 0; overflow-wrap: anywhere; }
  .erow .eamt { font-variant-numeric: tabular-nums; white-space: nowrap; text-align: right; margin-left: auto; }
  .erow .eamt .won { font-weight: 600; }
  .erow .eamt .usd { color: var(--muted); font-size: 12px; }
  .erow.excl .eamt .won { color: var(--muted); font-weight: 500; text-decoration: line-through; }
  .epay { display: inline-block; font-size: 11px; color: var(--blue); border: 1px solid var(--line);
    border-radius: 999px; padding: 0 7px; vertical-align: middle; }
  .exbadge { display: inline-block; font-size: 11px; color: #8a6d3b; background: #fbf3df;
    border-radius: 999px; padding: 1px 7px; vertical-align: middle; }
  /* 토스트 안내 (모바일 PDF 등) */
  #toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); max-width: 90%;
    background: #2b2b2b; color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 13px;
    box-shadow: 0 6px 24px rgba(0,0,0,.25); opacity: 0; pointer-events: none; transition: opacity .2s;
    z-index: 200; line-height: 1.5; text-align: center; }
  #toast.show { opacity: .97; }

  /* ===== 인쇄 / PDF 저장용 ===== */
  @media print {
    @page { margin: 12mm; }
    html, body { background: #fff !important; width: auto; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; box-shadow: none !important; }
    .wrap { max-width: none !important; width: auto !important; padding: 0 !important; margin: 0 !important; }
    /* 인쇄 시 모든 탭 펼쳐 보임 */
    .tabbar { display: none !important; }
    .tab-panel { display: block !important; }
    /* 화면 전용 UI 숨김 */
    .toolbar, #syncBadge, .imgtoggle, #toast,
    .section-head button, .day-head button, .day-head .caret,
    .tl-actions, .tl-caret, .rate-row button, .rate-row label,
    .hero .edit-btn, .map-frame { display: none !important; }
    /* 인쇄 때는 접힌 일정 항목도 모두 펼쳐 보임 */
    .tl-detail { display: block !important; }
    /* 접힌 날짜/이미지도 인쇄 때는 모두 펼침 */
    .timeline, .tl-memo img { display: block !important; }
    /* 큰 카드(.day)는 페이지 넘김 허용, 작은 단위만 안 잘리게 */
    .day, .section, .link-group, .tl-item, .tl-detail { break-inside: auto; }
    .bday, .bcard, .totalcard, .link-item, table.dash tr { break-inside: avoid; }
    .tl-memo img, .hero .memo img { break-inside: avoid; }
    .day-head, .bday-head, h1, h2 { break-after: avoid; }
    .hero, .day, .bday { border: 1px solid #ddd; }
    .section { margin-top: 18px; }
    a { color: #000 !important; text-decoration: none; }
    /* 가로 넘침/잘림 방지 */
    .tl-memo, .erow, .link-item { overflow-wrap: anywhere; word-break: break-word; }
    .link-item .url { max-width: none; white-space: normal; color: #555; }
    /* 인쇄 시 사진은 작게 — 페이지 넘김/여백 최소화 (글자와 함께 흐르도록) */
    .tl-memo img, .hero .memo img { max-width: 50% !important; max-height: 4cm !important; }
    .erow { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="brand">🇺🇸 <span>USA</span> Trip Planner</div>
  <span id="syncBadge" style="font-size:13px;color:#8a8a82">연결 중…</span>
  <button class="sm" onclick="doPrint()">📄 PDF로 저장</button>
  <button class="sm" onclick="exportJSON()">💾 백업 저장</button>
  <button class="sm ghost" onclick="restoreBackup()" title="백업 파일에서 복원 (현재 데이터 덮어씀)">복원</button>
  <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
</div>

<div class="wrap">

  <!-- ===== OVERVIEW / HERO ===== -->
  <div class="hero" id="hero"><!-- rendered --></div>

  <!-- ===== TAB BAR ===== -->
  <div class="tabbar">
    <button class="tab active" id="tabbtn-itinerary" onclick="switchTab('itinerary')">📅 일정표</button>
    <button class="tab" id="tabbtn-budget" onclick="switchTab('budget')">💰 예산</button>
  </div>

  <!-- ===== TAB: ITINERARY (+ LINKS) ===== -->
  <div class="tab-panel" id="tab-itinerary">
    <div class="section">
      <div class="section-head">
        <h2>📅 일정표</h2>
        <span class="count" id="dayCount"></span>
        <span class="sp"></span>
        <button class="sm primary" onclick="openDayForm()">+ 날짜 추가</button>
      </div>
      <div id="dashboard"></div>
      <div id="days"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>🔗 링크 모음</h2>
        <span class="sp"></span>
        <button class="sm primary" onclick="openLinkForm()">+ 링크 추가</button>
      </div>
      <div id="links"></div>
    </div>
  </div>

  <!-- ===== TAB: BUDGET ===== -->
  <div class="tab-panel" id="tab-budget" style="display:none">
    <div class="section">
      <div class="rate-row">
        기본 환율 <b style="color:var(--ink)">1 USD =</b>
        <input type="number" id="rate" value="1350" min="0" step="0.01" oninput="onRateChange()"> KRW
        <button class="sm" id="rateRefresh" onclick="fetchRate(true)" title="실시간 환율 가져오기">🔄</button>

/* ---------------- helpers ---------------- */
const DOW = ["일", "월", "화", "수", "목", "금", "토"];
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return `${d.getMonth() + 1}월 ${d.getDate()}일`;
}
function dow(iso) {
  if (!iso) return "";
  const d = new Date(iso + "T00:00:00");
  return DOW[d.getDay()] + "요일";
}
function daysBetween(a, b) {
  if (!a || !b) return 0;
  const ms = new Date(b + "T00:00:00") - new Date(a + "T00:00:00");
  return Math.round(ms / 86400000) + 1;
}
function ddayLabel(start) {
  if (!start) return "";
  const today = new Date(); today.setHours(0,0,0,0);
  const s = new Date(start + "T00:00:00");
  const diff = Math.round((s - today) / 86400000);
  if (diff > 0) return `D-${diff}`;
  if (diff === 0) return "D-DAY 🎉";
  return `여행 ${-diff}일차 이후`;
}
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function mapSearchUrl(q) {
  return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(q);
}
function mapEmbedUrl(q) {
  return "https://maps.google.com/maps?q=" + encodeURIComponent(q) + "&output=embed";
}
function fmtMoney(amount, cur) {
  const sym = cur === "KRW" ? "₩" : "$";
  return sym + Number(amount).toLocaleString(undefined, { maximumFractionDigits: cur === "KRW" ? 0 : 2 });
}

/* ---- rich memo: image compression + html sanitize ---- */
// 붙여넣은 이미지를 긴 변 1000px / JPEG 0.72로 축소해 base64 dataURL로 반환
function compressImage(file, maxSide = 1000, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxSide || h > maxSide) {
          const r = Math.min(maxSide / w, maxSide / h);
          w = Math.round(w * r); h = Math.round(h * r);
        }
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
// contenteditable에 이미지 붙여넣기/드롭 시 압축본으로 삽입
async function handleImagePaste(e) {
  const items = (e.clipboardData || e.dataTransfer || {}).items || [];
  const files = [];
  for (const it of items) if (it.kind === "file" && it.type.startsWith("image/")) {
    const f = it.getAsFile(); if (f) files.push(f);
  }
  if (!files.length) return;          // 일반 텍스트 붙여넣기는 기본 동작 유지
  e.preventDefault();
  for (const f of files) {
    try {
      const dataUrl = await compressImage(f);
      document.execCommand("insertHTML", false, `<img src="${dataUrl}">`);
    } catch (err) { console.warn("image insert failed", err); }
  }
}
// 저장 전 허용 태그(img/br/p/div/b/i/strong/em)만 남기고 정리 — XSS 방지
// style 속성에서 허용 CSS 속성만 남김 (url()/expression 등 위험 값 차단)
const STYLE_PROPS = ["color", "background-color", "font-size", "font-weight", "font-style", "text-decoration", "width"];
function sanitizeStyle(style) {
  return style.split(";").map(s => s.trim()).filter(Boolean).filter(decl => {
    const i = decl.indexOf(":"); if (i < 0) return false;
    const prop = decl.slice(0, i).trim().toLowerCase();
    const val = decl.slice(i + 1).trim().toLowerCase();
    if (!STYLE_PROPS.includes(prop)) return false;
    if (/url\(|expression|javascript:|@import|<\//.test(val)) return false;
    return true;
  }).join("; ");
}
function sanitizeMemo(html) {
  const tpl = document.createElement("div");
  tpl.innerHTML = html;
  const ALLOWED = {
    IMG: ["src", "alt", "style"], BR: [], P: ["style"], DIV: ["style"],
    B: [], STRONG: [], I: [], EM: [], U: [], SPAN: ["style"], FONT: ["color", "size"]
  };
  const DROP = { SCRIPT: 1, STYLE: 1, NOSCRIPT: 1, IFRAME: 1, OBJECT: 1, EMBED: 1, TEMPLATE: 1, LINK: 1, META: 1 };
  (function walk(node) {
    [...node.childNodes].forEach(ch => {
      if (ch.nodeType === 1) {
        const tag = ch.tagName;
        if (!ALLOWED[tag]) {
          if (DROP[tag]) { ch.remove(); return; }   // 위험 요소는 내용째 제거
          const kids = [...ch.childNodes]; ch.replaceWith(...kids); kids.forEach(walk); return;
        }
        [...ch.attributes].forEach(a => { if (!ALLOWED[tag].includes(a.name.toLowerCase())) ch.removeAttribute(a.name); });
        if (ch.hasAttribute("style")) {
          const cleaned = sanitizeStyle(ch.getAttribute("style"));
          if (cleaned) ch.setAttribute("style", cleaned); else ch.removeAttribute("style");
        }
        // img는 data:image base64만 허용 (외부/스크립트 URL 차단)
        if (tag === "IMG" && !/^data:image\//.test(ch.getAttribute("src") || "")) { ch.remove(); return; }
        walk(ch);
      } else if (ch.nodeType === 8) { ch.remove(); }  // 주석 제거
    });
  })(tpl);
  return tpl.innerHTML;
}

/* ---- 메모 편집기: 서식 툴바 + 이미지 선택/리사이즈 ---- */
function rtCmd(cmd, val) { document.execCommand(cmd, false, val); }
let selImg = null;

  if (selImg) selImg.classList.add("sel");

}
function rtImgSize(w) { if (selImg) { if (w) selImg.style.width = w; else selImg.style.removeProperty("width"); } }
function bindRich(el) {
  el.addEventListener("paste", handleImagePaste);
  el.addEventListener("drop", handleImagePaste);
  el.addEventListener("click", e => rtSelectImg(e.target.tagName === "IMG" ? e.target : null));
}
function richToolbar() {

      <button type="button" onmousedown="event.preventDefault()" onclick="rtCmd('fontSize',4)">보통</button>

      <button type="button" class="sm" onclick="rtImgSize('25%')">작게</button>
      <button type="button" class="sm" onclick="rtImgSize('50%')">중간</button>
      <button type="button" class="sm" onclick="rtImgSize('75%')">크게</button>
      <button type="button" class="sm" onclick="rtImgSize('')">원본</button>

}
function memoHasContent(html) {
  const d = document.createElement("div"); d.innerHTML = html;
  return !!(d.querySelector("img") || d.textContent.trim());
}

/* ---------------- render: overview ---------------- */
function renderHero() {
  const o = state.overview;
  const total = daysBetween(o.startDate, o.endDate);
  const range = o.startDate
    ? `${fmtDate(o.startDate)} – ${fmtDate(o.endDate)}` + (total ? ` (${total - 1}박 ${total}일)` : "")
    : "기간 미정";
  document.getElementById("hero").innerHTML = `
    <button class="sm edit-btn" onclick="openOverviewForm()">편집</button>

/* ---------------- render: days ---------------- */
const collapsedDays = new Set();   // 세션 내 접힌 날짜(day.id) — 재렌더에도 유지
const expandedItems = new Set();   // 세부사항이 펼쳐진 일정 항목(it.id). 기본은 접힘
function sortedDays() {
  return [...state.days].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
}
function sortedItems(day) {
  return [...day.items];   // 수동 순서(저장된 배열 순서) 유지 — ▲/▼로 조정
}

// 상단 대시보드 요약표
function renderDashboard() {
  const el = document.getElementById("dashboard");
  const days = sortedDays();
  if (!days.length) { el.innerHTML = ""; return; }
  el.innerHTML = `
    <div class="dash-wrap"><table class="dash">
      <thead><tr><th>날짜</th><th>요일</th><th>일정</th><th>주요 일정</th></tr></thead>
      <tbody>
        ${days.map(d => {
          const items = sortedItems(d);
          const places = items.map(i => esc(i.place || "")).filter(Boolean);
          const summary = places.slice(0, 3).join(", ") + (places.length > 3 ? ` 외 ${places.length - 3}` : "");
          return `<tr onclick="scrollToDay('${d.id}')">
            <td>${esc(fmtDate(d.date))}</td>
            <td>${esc(dow(d.date))}</td>
            <td class="dcnt">${items.length}</td>
            <td>${summary || "-"}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table></div>`;
}

function renderDays() {
  renderDashboard();
  const wrap = document.getElementById("days");
  const days = sortedDays();
  document.getElementById("dayCount").textContent = days.length ? `${days.length}일` : "";
  if (!days.length) {
    wrap.innerHTML = `<div class="empty">아직 일정이 없습니다. “+ 날짜 추가”로 시작하세요.</div>`;
    return;
  }
  wrap.innerHTML = days.map(day => {
    const collapsed = collapsedDays.has(day.id);
    const items = sortedItems(day);
    const itemsHtml = items.length ? items.map(it => {
      const open = expandedItems.has(it.id);
      const hasMemo = !!(it.memoHtml || it.memo);
      const hint = `${it.mapQuery ? "📍" : ""}${hasMemo ? "📝" : ""}`;
      const memoHtml = it.memoHtml ? `<div class="tl-memo">${it.memoHtml}</div>` : (it.memo ? `<div class="tl-memo">${esc(it.memo)}</div>` : "");
      return `
      <div class="tl-item${open ? " open" : ""}" id="item-${it.id}">
        <div class="tl-top" onclick="toggleItem('${it.id}')">
          <span class="tl-time${it.time ? "" : " empty"}" id="time-${it.id}" title="시간 입력/수정"
                onclick="event.stopPropagation(); editTime('${day.id}','${it.id}')">${it.time ? esc(it.time) : "＋시간"}</span>
          <span class="tl-place">${esc(it.place || "")}</span>
          ${hint ? `<span class="tl-hint">${hint}</span>` : ""}
          <span class="tl-caret">${open ? "▾" : "▸"}</span>
        </div>
        <div class="tl-detail"${open ? "" : ' style="display:none"'}>
          ${memoHtml}
          <div class="tl-actions">
            <button class="ghost sm" onclick="moveItem('${day.id}','${it.id}',-1)" title="위로">▲</button>
            <button class="ghost sm" onclick="moveItem('${day.id}','${it.id}',1)" title="아래로">▼</button>
            ${it.mapQuery ? `<a class="maplink" href="${esc(mapSearchUrl(it.mapQuery))}" target="_blank" rel="noopener">🗺️ 지도</a>
              <button class="ghost sm" onclick="toggleMap('${day.id}','${it.id}',this)">지도보기</button>` : ""}
            <button class="ghost sm" onclick="openItemForm('${day.id}','${it.id}')">수정</button>
            <button class="ghost sm" onclick="delItem('${day.id}','${it.id}')">삭제</button>
          </div>
          <div class="map-frame" id="map-${day.id}-${it.id}" style="display:none"></div>
        </div>
      </div>`;
    }).join("") : `<div class="empty">일정 항목이 없습니다.</div>`;

    return `
      <div class="day" id="day-${day.id}">
        <div class="day-head">
          <button class="ghost sm caret" onclick="toggleDayCollapse('${day.id}')" title="접기/펼치기">${collapsed ? "▸" : "▾"}</button>
          <span class="date">${esc(fmtDate(day.date))}</span>
          <span class="dow">${esc(dow(day.date))}</span>
          <span class="cnt">${items.length}개</span>
          <span class="sp"></span>
          <button class="ghost sm" onclick="sortDayByTime('${day.id}')" title="이 날 일정을 시간순으로 정렬">🕘 시간순</button>
          <button class="ghost sm" onclick="openItemForm('${day.id}')">+ 일정</button>
          <button class="ghost sm" onclick="openDayForm('${day.id}')">날짜수정</button>
          <button class="ghost sm" onclick="delDay('${day.id}')">삭제</button>
        </div>
        <div class="timeline"${collapsed ? ' style="display:none"' : ""}>${itemsHtml}</div>
      </div>
    `;
  }).join("");
  enhanceMemos();
}

function toggleDayCollapse(id) {
  if (collapsedDays.has(id)) collapsedDays.delete(id); else collapsedDays.add(id);
  renderDays();
}
// 시간 칸을 클릭하면 그 자리에서 시간 입력 (인라인 편집)
function editTime(dayId, itemId) {
  const el = document.getElementById("time-" + itemId);
  const day = state.days.find(d => d.id === dayId);
  const it = day && day.items.find(i => i.id === itemId);
  if (!el || !it) return;
  el.innerHTML = `<input type="time" class="tl-timeinput" value="${esc(it.time || "")}"
    onclick="event.stopPropagation()"
    onchange="saveTime('${dayId}','${itemId}', this.value)"
    onblur="renderDays()">`;
  const input = el.querySelector("input");
  input.focus();
  if (input.showPicker) { try { input.showPicker(); } catch (_) {} }
}
function saveTime(dayId, itemId, v) {
  const day = state.days.find(d => d.id === dayId);
  const it = day && day.items.find(i => i.id === itemId);
  if (!it) return;
  it.time = v;
  save();   // 정렬·렌더·클라우드 동기화
}
// 일정 항목 세부사항 펼치기/접기 (DOM만 토글 — 렌더 유지)
function toggleItem(id) {
  const open = !expandedItems.has(id);
  if (open) expandedItems.add(id); else expandedItems.delete(id);
  const el = document.getElementById("item-" + id);
  if (!el) return;
  el.classList.toggle("open", open);
  const d = el.querySelector(".tl-detail"); if (d) d.style.display = open ? "" : "none";
  const c = el.querySelector(".tl-caret"); if (c) c.textContent = open ? "▾" : "▸";
}
function scrollToDay(id) {
  switchTab("itinerary");
  collapsedDays.delete(id);
  renderDays();
  const el = document.getElementById("day-" + id);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
}

// 읽기 화면 메모의 각 이미지를 접기/펼치기 토글로 감쌈 (저장 데이터는 불변)
function enhanceMemos() {
  document.querySelectorAll(".tl-memo img, .hero .memo img").forEach(img => {
    if (img.dataset.enh || !img.parentNode) return;
    img.dataset.enh = "1";
    const wrap = document.createElement("span");
    wrap.className = "imgwrap";
    const btn = document.createElement("button");
    btn.type = "button"; btn.className = "imgtoggle"; btn.textContent = "🖼️ 사진 접기";
    img.parentNode.insertBefore(wrap, img);
    wrap.appendChild(btn);

/* ---------------- render: budget ---------------- */
const wonFmt = (n) => "₩" + Math.round(Number(n) || 0).toLocaleString();
const usdFmt = (n) => "$" + (Number(n) || 0).toLocaleString(undefined, { maximumFractionDigits: 2 });

// 구 형식(배열) → 신 형식(객체) 1회 변환. 여러 번 호출해도 안전(멱등).
function normalizeBudget() {
  const rate = Number(state.rate) || 1350;
  let b = state.budget;
  if (Array.isArray(b)) {
    state.budget = {
      fixed: b.map(o => {
        const amt = Number(o.amount) || 0;
        const krw = o.currency === "KRW" ? amt : Math.round(amt * rate);
        const usd = o.currency === "KRW" ? Math.round(amt / rate * 100) / 100 : amt;
        return { id: o.id || uid(), category: o.category || "기타", label: o.label || "", krw, usd };
      }),
      daily: {}
    };
  } else if (!b || typeof b !== "object") {
    state.budget = { fixed: [], daily: {} };
  } else {
    if (!Array.isArray(b.fixed)) b.fixed = [];
    if (!b.daily || typeof b.daily !== "object") b.daily = {};
  }
}
function dayRate(dateKey) {
  const d = state.budget.daily[dateKey];
  return (d && Number(d.rate)) || Number(state.rate) || 1350;
}
function expenseRow(scope, dateKey, e) {
  const excl = !!e.exclude;
  return `<div class="erow${excl ? " excl" : ""}">
    <span class="ecat cat-pill">${esc(e.category)}</span>
    <span class="elabel">${esc(e.label)}${e.pay ? ` <span class="epay">${esc(e.pay)}</span>` : ""}${excl ? ` <span class="exbadge">합계제외</span>` : ""}</span>
    <span class="eamt"><span class="won">${wonFmt(e.krw)}</span> · <span class="usd">${usdFmt(e.usd)}</span></span>
    <button class="ghost sm" onclick="openExpenseForm('${scope}','${dateKey}','${e.id}')">수정</button>
    <button class="ghost sm" onclick="delExpense('${scope}','${dateKey}','${e.id}')">삭제</button>
  </div>`;
}
function renderBudget() {
  normalizeBudget();
  const fixed = state.budget.fixed;
  const daily = state.budget.daily;

  // 합계 — 제외(환전 등)는 실지출에서 빼고 따로 집계
  let totKrw = 0, totUsd = 0, exKrw = 0, exUsd = 0;
  const tally = e => {
    if (e.exclude) { exKrw += Number(e.krw) || 0; exUsd += Number(e.usd) || 0; }
    else { totKrw += Number(e.krw) || 0; totUsd += Number(e.usd) || 0; }
  };
  fixed.forEach(tally);
  Object.values(daily).forEach(d => (d.items || []).forEach(tally));

  document.getElementById("budgetTotal").innerHTML = `
    <div class="totalcard">
      <div><div class="lbl">실지출 합계 (원화)</div><div class="big">${wonFmt(totKrw)}</div></div>
      <div><div class="lbl">실지출 합계 (달러)</div><div class="big">${usdFmt(totUsd)}</div></div>
      ${(exKrw || exUsd) ? `<div><div class="lbl">환전·제외 (참고)</div><div class="sub">${wonFmt(exKrw)} · ${usdFmt(exUsd)}</div></div>` : ""}
    </div>`;

  // 사전 예산
  document.getElementById("budgetFixed").innerHTML = fixed.length
    ? fixed.map(e => expenseRow("fixed", "", e)).join("")
    : `<div class="empty">사전 예산 항목이 없습니다.</div>`;

  // 날짜별 지출: 일정표 날짜 + 지출만 있는 날짜의 합집합, 날짜순
  const dateKeys = [...new Set([...state.days.map(d => d.date), ...Object.keys(daily)])]
    .filter(Boolean).sort((a, b) => a.localeCompare(b));
  const wrap = document.getElementById("budgetDaily");
  if (!dateKeys.length) {
    wrap.innerHTML = `<div class="empty">날짜가 없습니다. 일정표에서 날짜를 먼저 추가하세요.</div>`;
    return;
  }
  wrap.innerHTML = dateKeys.map(dk => {
    const bucket = daily[dk] || { rate: Number(state.rate) || 1350, items: [] };
    const items = bucket.items || [];
    let dk_krw = 0, dk_usd = 0, dkx_krw = 0;
    items.forEach(e => {
      if (e.exclude) { dkx_krw += Number(e.krw) || 0; }
      else { dk_krw += Number(e.krw) || 0; dk_usd += Number(e.usd) || 0; }
    });
    return `<div class="bday">
      <div class="bday-head">
        <span class="date">${esc(fmtDate(dk))}</span>
        <span class="dow">${esc(dow(dk))}</span>
        <span class="bday-rate">그날 환율 1$=<input type="number" min="0" step="0.01" value="${dayRate(dk)}" onchange="onDayRateChange('${dk}', this.value)">원</span>
        <button class="ghost sm" onclick="openExpenseForm('daily','${dk}')">+ 지출</button>
      </div>
      ${items.length ? items.map(e => expenseRow("daily", dk, e)).join("") : `<div class="empty" style="padding:4px 0">지출 없음</div>`}
      <div class="bsub">소계 <b style="color:var(--ink)">${wonFmt(dk_krw)}</b> · ${usdFmt(dk_usd)}${dkx_krw ? ` <span style="color:var(--muted)">· 제외 ${wonFmt(dkx_krw)}</span>` : ""}</div>
    </div>`;
  }).join("");
}
function onRateChange() {
  state.rate = Number(document.getElementById("rate").value) || 0;
  // 사용자가 직접 고치면 수동으로 전환

  state.rateSource = "수동";

/* ---- 실시간 환율 (USD→KRW) ---- */
const RATE_TTL = 60 * 60 * 1000;   // 1시간
function renderRateStatus() {
  const el = document.getElementById("rateStatus");
  if (!el) return;
  if (state.rateSource === "수동" || !state.rateUpdatedAt) {
    el.textContent = state.rateSource === "수동" ? "· 수동 입력" : "";
    return;
  }
  const d = new Date(state.rateUpdatedAt);
  const hh = String(d.getHours()).padStart(2, "0");
  const mm = String(d.getMinutes()).padStart(2, "0");
  el.textContent = `· 실시간 ${hh}:${mm} 기준`;
}
// force=true면 캐시 무시하고 즉시 호출
async function fetchRate(force) {
  const fresh = state.rateUpdatedAt && (Date.now() - state.rateUpdatedAt < RATE_TTL);
  if (!force && (!state.autoRate || fresh)) { renderRateStatus(); return; }
  const el = document.getElementById("rateStatus");
  if (el) el.textContent = "· 불러오는 중…";
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const krw = data && data.rates && data.rates.KRW;
    if (!krw) throw new Error("KRW 없음");
    state.rate = Math.round(krw * 100) / 100;   // 소수 2자리
    state.rateUpdatedAt = Date.now();
    state.rateSource = "실시간";
    state.autoRate = true;
    localStorage.setItem(KEY, JSON.stringify(state));
    document.getElementById("rate").value = state.rate;
    const auto = document.getElementById("rateAuto");
    if (auto) auto.checked = true;
    renderRateStatus();
    renderBudget();
  } catch (e) {
    console.warn("rate fetch failed", e);
    if (el) el.textContent = "· 환율 가져오기 실패(입력값 사용)";
  }
}
function onAutoToggle() {
  state.autoRate = document.getElementById("rateAuto").checked;
  if (state.autoRate) {
    state.rateSource = "실시간";
    localStorage.setItem(KEY, JSON.stringify(state));
    fetchRate(true);
  } else {
    state.rateSource = "수동";
    localStorage.setItem(KEY, JSON.stringify(state));
    renderRateStatus();
  }
}

function saveItem(dayId, itemId) {
  const day = state.days.find(d => d.id === dayId);

  const data = { time: val("f_time"), place: val("f_place"), memoHtml, mapQuery: val("f_map") };
  if (!data.place) { alert("장소를 입력하세요."); return; }
  if (itemId) {
    const t = day.items.find(i => i.id === itemId);
    delete t.memo;              // 구 평문 메모 제거 (memoHtml로 일원화)
    Object.assign(t, data);

// 항목 위/아래 이동 (dir: -1 위, +1 아래)
function moveItem(dayId, itemId, dir) {
  const day = state.days.find(d => d.id === dayId);
  if (!day) return;
  const i = day.items.findIndex(x => x.id === itemId);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= day.items.length) return;
  [day.items[i], day.items[j]] = [day.items[j], day.items[i]];
  save();
}
// 그 날 일정을 시간순으로 한 번 정렬
function sortDayByTime(dayId) {
  const day = state.days.find(d => d.id === dayId);
  if (!day) return;
  day.items.sort((a, b) => (a.time || "").localeCompare(b.time || ""));
  save();
}

let fxLastEdited = "usd";   // 마지막으로 사용자가 직접 친 금액 칸 (환율 변경 시 기준)
// 입력 중인 칸을 기준으로 반대쪽을 매번 재계산.
function autoFx(which) {
  fxLastEdited = which;

  if (!rate || !k || !u) return;
  if (which === "krw") u.value = (k.value === "" ? "" : (Number(k.value) / rate).toFixed(2));
  else k.value = (u.value === "" ? "" : String(Math.round(Number(u.value) * rate)));
}
// 환율칸을 바꾸면 '마지막에 입력한 금액 칸'을 기준으로 반대쪽 재계산
function onFormRate() {
  const k = document.getElementById("f_krw"), u = document.getElementById("f_usd");
  const rate = formRate();
  if (!rate || !k || !u) return;
  if (fxLastEdited === "krw" && k.value !== "") u.value = (Number(k.value) / rate).toFixed(2);
  else if (u.value !== "") k.value = String(Math.round(Number(u.value) * rate));

  const data = {
    category: val("f_cat") || "기타", label: val("f_label"),
    krw: Number(val("f_krw")) || 0, usd: Number(val("f_usd")) || 0,
    pay: document.getElementById("f_pay").value,
    exclude: document.getElementById("f_excl").checked
  };
  if (!data.label) { alert("항목명을 입력하세요."); return; }
  if (scope === "fixed") {
    if (id) Object.assign(state.budget.fixed.find(x => x.id === id), data);
    else state.budget.fixed.push({ id: uid(), ...data });
  } else {
    const bucket = state.budget.daily[dateKey] ||
      (state.budget.daily[dateKey] = { rate: Number(state.rate) || 1350, items: [] });
    const fr = Number(val("f_rate"));
    if (fr) bucket.rate = fr;   // 폼에서 입력한 환율을 그날 환율로 저장
    if (id) Object.assign(bucket.items.find(x => x.id === id), data);
    else bucket.items.push({ id: uid(), ...data });
  }
  closeModal(); save();
}
function delExpense(scope, dateKey, id) {
  if (scope === "fixed") {
    state.budget.fixed = state.budget.fixed.filter(x => x.id !== id);
  } else {
    const b = state.budget.daily[dateKey];
    if (b) b.items = b.items.filter(x => x.id !== id);
  }
  save();
}
function onDayRateChange(dateKey, v) {
  const r = Number(v) || 0;
  const b = state.budget.daily[dateKey] ||
    (state.budget.daily[dateKey] = { rate: r, items: [] });
  b.rate = r;
  save();
}

/* ---------------- link form ---------------- */
function openLinkForm(id) {
  const l = id ? state.links.find(x => x.id === id) : null;
  openModal(`
    <h3>${l ? "링크 수정" : "링크 추가"}</h3>
    <div class="field"><label>분류</label>
      <input id="f_lcat" list="lcatlist" value="${esc(l ? l.category : "")}" placeholder="항공 / 숙소 / 맛집 / 지도 / 기타">
      <datalist id="lcatlist">
        <option>항공</option><option>숙소</option><option>맛집</option><option>지도</option><option>기타</option>
      </datalist>
    </div>
    <div class="field"><label>제목</label><input id="f_ltitle" value="${esc(l ? l.title : "")}"></div>
    <div class="field"><label>URL</label><input id="f_lurl" value="${esc(l ? l.url : "")}" placeholder="https://..."></div>
    <div class="modal-actions">
      <button onclick="closeModal()">취소</button>
      <button class="primary" onclick="saveLink('${id || ""}')">저장</button>
    </div>`);
}
function saveLink(id) {
  let url = val("f_lurl");
  if (url && !/^https?:\/\//i.test(url)) url = "https://" + url;
  const data = { category: val("f_lcat") || "기타", title: val("f_ltitle") || url, url };
  if (!data.url) { alert("URL을 입력하세요."); return; }
  if (id) {
    Object.assign(state.links.find(x => x.id === id), data);
  } else {
    state.links.push({ id: uid(), ...data });
  }
  closeModal(); save();
}
function delLink(id) {
  state.links = state.links.filter(x => x.id !== id);
  save();
}

/* ---------------- import / export / reset ---------------- */
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "usa-trip-planner.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
// 복원: 덮어쓰기 경고 후에만 파일 선택창 열기
function restoreBackup() {
  if (confirm("백업(JSON) 파일로 현재 데이터를 덮어씁니다.\n클라우드와 다른 기기에도 반영됩니다. 계속할까요?")) {
    document.getElementById("importFile").click();
  }
}
function importJSON(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.overview || !Array.isArray(data.days)) throw new Error("형식 오류");
      state = data;
      state.budget = state.budget || [];
      state.links = state.links || [];
      state.rate = state.rate || 1350;
      if (state.autoRate === undefined) state.autoRate = true;
      state.rateUpdatedAt = state.rateUpdatedAt || 0;
      state.rateSource = state.rateSource || "";
      save();
      fetchRate(false);
      alert("가져오기 완료!");
    } catch (e) {
      alert("가져오기 실패: " + e.message);
    }
    ev.target.value = "";
  };
  reader.readAsText(file);
}
/* ---- PDF 저장 (모바일 안내 포함) ---- */
function toast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = document.createElement("div"); t.id = "toast"; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("show"), 6000);
}
function doPrint() {
  try { window.print(); } catch (_) {}
  // 모바일에서 인쇄창이 안 뜨는 경우(앱 내 브라우저 등) 안내
  if (window.matchMedia && window.matchMedia("(max-width: 760px)").matches) {
    toast("인쇄창이 안 열리면: 브라우저 공유/메뉴 → ‘인쇄(Print)’ → PDF로 저장. Safari·Chrome 권장 (카카오톡 등 앱 안 브라우저는 미지원 — Safari로 열어주세요).");
  }
}

/* ---------------- init ---------------- */
renderAll();
// 자동 모드면 캐시(1시간) 확인 후 필요 시 실시간 환율 호출
fetchRate(false);

/* ---------------- 클라우드 동기화 브리지 ---------------- */
// firebase-sync.js가 state를 읽고/교체할 수 있도록 노출
window.LOCAL_KEY = KEY;
window.TRIP_ID = "usa";
window.__getState = () => state;
window.__setState = (obj) => { state = obj; renderAll(); fetchRate(false); };
</script>
